<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Farrhan (Dip) - Links & Socials">
  <title>farrhan. (links)</title>
  <link href="https://fonts.googleapis.com/css2?family=PT+Mono&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #0B1215;
      --bg-card: #F3F3F3;
      --text: #0B1215;
      --border: #0B1215;
      --thick: 6px solid var(--border);
      --thin: 3px solid var(--border);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      color: var(--text);
      font-family: 'PT Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      gap: 1rem;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.3);
      z-index: -100;
    }

    .card {
      width: 100%;
      max-width: 650px;
      background-color: var(--bg-card);
      border: var(--thin);
    }

    header {
      padding: 2rem 1rem;
      border-bottom: var(--thick);
      text-align: center;
      color: var(--text);
    }

    nav {
      padding: 1rem;
      display: grid;
      gap: 0.3rem;
    }

    .btn {
      padding: 1rem;
      background-color: var(--border);
      color: var(--bg-card);
      text-align: center;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .back-link {
      color: var(--text);
      font-size: 1rem;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .text {
      font-family: 'PT Mono', monospace;
      font-size: 1rem;
      text-align: center;
      padding: 1rem;
      color: var(--text);
    }

  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bg-video">
    <source src="/assets/bg-loop.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <main class="card">
   <header>
      <a href="/index.html" class="back-link">← farrhan. / Home</a>
    </header>

<nav>
  <a href="https://youtube.com/@dattebow" class="btn">YouTube</a>
  <a href="https://instagram.com/by.farrhan" target="_blank" class="btn">Instagram</a>
  <a href="https://twitter.com/by_farrhan" target="_blank" class="btn">Twitter</a>
  <a href="https://www.linkedin.com/in/aiedel-farrhan" target="_blank" class="btn">LinkedIn</a>
  <a href="mailto:dip@farrhan.com" class="btn">Email</a>
</nav>

<footer class="card-footer">
  <p class="text">Feel free to contact me for projects or inquiries! :)</p>
</footer>

  </main>
</body>
</html>
